# MT5 Bot Configuration
# Copy .env.example to .env and fill in your credentials (never commit .env)

mt5:
  # Path to terminal64.exe — use the temp-launcher copy (start_mt5.sh runs MT5 from here
  # so the liveupdate can write the updated binary to Program Files without a sharing violation)
  terminal_path: "C:\\users\\rock\\AppData\\Local\\Temp\\mt5_launcher\\terminal64.exe"
  # WINEPREFIX for running MT5
  wine_prefix: "/home/rock/.mt5"
  # Credentials loaded from .env (MT5_LOGIN, MT5_PASSWORD, MT5_SERVER)
  login: null      # override: set MT5_LOGIN in .env
  password: null   # override: set MT5_PASSWORD in .env
  server: null     # override: set MT5_SERVER in .env (e.g. "ICMarkets-Demo")
  timeout: 60000   # connection timeout ms

trading:
  # Risk management
  risk_per_trade: 0.01      # 1% of account balance per trade
  max_open_trades: 5
  max_daily_loss: 0.05      # stop trading if daily loss exceeds 5%
  magic_number: 20260101    # unique ID for this bot's orders

  # Default symbol settings (override per bot)
  symbol: "EURUSD"
  timeframe: "M15"          # M1 M5 M15 M30 H1 H4 D1 W1 MN1
  lot_size: 0.01            # minimum lot, overridden by risk_per_trade if > 0

example_bot:
  symbol: "EURUSD"
  timeframe: "M15"
  fast_ma: 9
  slow_ma: 21
  sl_pips: 30
  tp_pips: 60

ai_bot:
  symbol: "EURUSD"
  timeframe: "M15"
  sl_pips: 30           # stop loss in pips
  tp_pips: 60           # take profit in pips (2:1 RR)
  candles: 50           # how many candles to fetch for analysis
  min_confidence: "medium"  # "high" = only high-confidence signals; "medium" = medium or high

# ── Phase 1: Random baseline ───────────────────────────────────────────────────
random_bot:
  symbol: "EURUSD"
  timeframe: "M15"
  entry_prob: 0.02      # probability of entering a trade on each tick (2%)
  sl_pips: 30
  tp_pips: 60
  seed: null            # set an integer for reproducible live-mode runs

# ── Phase 5: Pluggable Model Registry ─────────────────────────────────────────
# Change active_model here to swap models — no code changes required.
active_model: xgboost

models:
  xgboost:
    type: xgboost
    path: data/models/xgboost.joblib
  lightgbm:
    type: lightgbm
    path: data/models/lightgbm.joblib
  random_forest:
    type: random_forest
    path: data/models/random_forest.joblib
  catboost:
    type: catboost
    path: data/models/catboost.joblib
  lstm:
    type: lstm
    path: data/models/lstm.pt
  ensemble:
    type: ensemble
    path: data/models/ensemble.joblib

# ── Phase 6: Ensemble configuration ───────────────────────────────────────────
ensemble:
  base_models:
    - xgboost
    - lightgbm
    - catboost
    - random_forest
  meta_model: lightgbm     # logistic | lightgbm — lightgbm found to be better (lower log-loss, 2x confidence coverage)
  n_folds: 5               # CV folds for out-of-fold stacking
  use_original_features: false

# ── Phase 2: Rule-based signal bot ────────────────────────────────────────────
rule_bot:
  symbol: "EURUSD"
  timeframe: "M15"
  sl_pips: 30
  tp_pips: 60
  candles: 100          # bars fetched for indicator computation
  threshold: 0.55       # minimum P_buy or P_sell to open a trade
  # Indicator periods
  fast_ma: 9
  slow_ma: 21
  rsi_period: 14
  bb_period: 20
  atr_period: 14
  # Rule weights (relative importance)
  weight_ma_cross: 2.0
  weight_rsi: 1.5
  weight_bb: 1.0
  weight_macd: 1.0
