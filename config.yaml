# MT5 Bot Configuration
# Copy .env.example to .env and fill in your credentials (never commit .env)

# ── End-to-end Predictor Pipeline ─────────────────────────────────────────────
# Controls run_pipeline.py — one section to rule all pipeline behaviour.
#
# Quick commands:
#   conda run -n envmt5 python scripts/run_pipeline.py backtest  # evaluate
#   conda run -n envmt5 python scripts/run_pipeline.py train     # train + save
#   conda run -n envmt5 python scripts/run_pipeline.py predict   # live signal
#
# CLI overrides: --model, --no-enc, --epochs, --latent, --data, --out
pipeline:

  # ── Core ──────────────────────────────────────────────────────────────────
  model_type: xgboost          # xgboost | lightgbm | catboost | ensemble
  data_path: data/EURUSD_M15.csv
  train_frac: 0.8              # fraction used to fit scaler + encoder

  # ── Feature engineering ───────────────────────────────────────────────────
  features:
    label_horizon: 4           # bars ahead for direction label
    label_threshold: 0.0003    # min return to count as buy/sell (else hold)
    scale: true                # StandardScaler on base features

  # ── Supervised latent encoder ─────────────────────────────────────────────
  # Set enabled: false to fall back to baseline 31-feature XGBoost.
  # Current best result: supervised + latent_dim=8 → Sharpe +3.13 (vs +0.72 baseline)
  encoder:
    enabled: true
    mode: supervised           # supervised (recommended) | autoencoder
    latent_dim: 8              # 8 = current best; try 4 (less noise) or 16 (more info)
    window_size: 50            # OHLCV bars per encoder input window
    epochs: 30                 # training epochs (try 60-80 for more accuracy)
    batch_size: 4096
    lr: 0.001

  # ── Walk-forward evaluation ───────────────────────────────────────────────
  walk_forward:
    window_type: expanding     # expanding (recommended) | sliding
    train_days: 180            # minimum training window
    test_days: 30              # test fold length
    cache_dir: data/models/pipeline_wf_cache

  # ── Backtester ────────────────────────────────────────────────────────────
  backtest:
    threshold: 0.40            # min P_buy or P_sell to open a trade
    sl_pips: 30.0
    tp_pips: 60.0              # 2:1 reward-to-risk
    spread_pips: 1.0
    initial_balance: 10000.0
    risk_pct: 0.01             # base risk % (overridden per trade by risk_manager tiers)
    use_regime_filter: false

  # ── Artifact storage ──────────────────────────────────────────────────────
  # All fitted objects (scaler, encoder, model) are saved here for live use.
  artifacts:
    directory: data/models/pipeline

mt5:
  # Path to terminal64.exe — use the temp-launcher copy (start_mt5.sh runs MT5 from here
  # so the liveupdate can write the updated binary to Program Files without a sharing violation)
  terminal_path: "C:\\users\\rock\\AppData\\Local\\Temp\\mt5_launcher\\terminal64.exe"
  # WINEPREFIX for running MT5
  wine_prefix: "/home/rock/.mt5"
  # Credentials loaded from .env (MT5_LOGIN, MT5_PASSWORD, MT5_SERVER)
  login: null      # override: set MT5_LOGIN in .env
  password: null   # override: set MT5_PASSWORD in .env
  server: null     # override: set MT5_SERVER in .env (e.g. "ICMarkets-Demo")
  timeout: 60000   # connection timeout ms

trading:
  # Risk management
  risk_per_trade: 0.01      # 1% of account balance per trade
  max_open_trades: 5
  max_daily_loss: 0.05      # stop trading if daily loss exceeds 5%
  magic_number: 20260101    # unique ID for this bot's orders

  # Default symbol settings (override per bot)
  symbol: "EURUSD"
  timeframe: "M15"          # M1 M5 M15 M30 H1 H4 D1 W1 MN1
  lot_size: 0.01            # minimum lot, overridden by risk_per_trade if > 0

example_bot:
  symbol: "EURUSD"
  timeframe: "M15"
  fast_ma: 9
  slow_ma: 21
  sl_pips: 30
  tp_pips: 60

ai_bot:
  symbol: "EURUSD"
  timeframe: "M15"
  sl_pips: 30           # stop loss in pips
  tp_pips: 60           # take profit in pips (2:1 RR)
  candles: 50           # how many candles to fetch for analysis
  min_confidence: "medium"  # "high" = only high-confidence signals; "medium" = medium or high

# ── Phase 1: Random baseline ───────────────────────────────────────────────────
random_bot:
  symbol: "EURUSD"
  timeframe: "M15"
  entry_prob: 0.02      # probability of entering a trade on each tick (2%)
  sl_pips: 30
  tp_pips: 60
  seed: null            # set an integer for reproducible live-mode runs

# ── Phase 5: Pluggable Model Registry ─────────────────────────────────────────
# Change active_model here to swap models — no code changes required.
active_model: xgboost

models:
  xgboost:
    type: xgboost
    path: data/models/xgboost.joblib
  lightgbm:
    type: lightgbm
    path: data/models/lightgbm.joblib
  random_forest:
    type: random_forest
    path: data/models/random_forest.joblib
  catboost:
    type: catboost
    path: data/models/catboost.joblib
  lstm:
    type: lstm
    path: data/models/lstm.pt
  ensemble:
    type: ensemble
    path: data/models/ensemble.joblib
  llm_signal:
    type: llm_signal
    path: data/models/llm_signal.joblib
  bar_lm:
    type: bar_lm
    path: data/models/bar_lm.pt

# ── Phase 6: Ensemble configuration ───────────────────────────────────────────
ensemble:
  base_models:
    - xgboost
    - lightgbm
    - catboost
    - random_forest
  meta_model: lightgbm     # logistic | lightgbm — lightgbm found to be better (lower log-loss, 2x confidence coverage)
  n_folds: 5               # CV folds for out-of-fold stacking
  use_original_features: false

# ── Phase 9: LLM Signal + Bar Language Model ──────────────────────────────────
llm_signal:
  provider: claude_api   # "claude_cli" = use `claude` terminal auth; "claude_api" = use ANTHROPIC_API_KEY
  model_id: claude-haiku-4-5-20251001   # cheapest capable model; swap to claude-sonnet-4-6 for higher quality
  n_context_bars: 32                    # bars of tokenized history per prompt
  cache_bars: 4                         # live mode: reuse result for N bars
  cache_path: data/models/llm_cache.parquet  # pre-computed signal cache

bar_lm:
  vocab_size: 47      # must match BarTokenizer.VOCAB_SIZE
  seq_len: 32
  d_model: 32
  n_heads: 4
  n_layers: 4
  ff_dim: 64
  epochs: 30

bar_tokenizer:
  atr_col: atr_14       # feature matrix column for ATR
  rsi_col: rsi_14
  sma_slow_col: sma_50
  doji_threshold: 0.10  # |body/ATR| < this → doji token
  wick_threshold: 0.40  # wick/range > this → dominant wick
  n_body_bins: 5        # XS/SM/MD/LG/XL quantile bins

# ── Phase 8: Intelligent Risk Management ──────────────────────────────────────
risk_manager:
  # Confidence tiers: list of [min_confidence, risk_pct] pairs (descending order)
  tiers:
    - [0.75, 0.020]   # P >= 0.75 → 2.0% risk
    - [0.65, 0.015]   # P >= 0.65 → 1.5% risk
    - [0.55, 0.0075]  # P >= 0.55 → 0.75% risk
    - [0.40, 0.005]   # P >= 0.40 → 0.5% risk
  min_confidence: 0.40  # below this → skip trade
  # Fractional Kelly (off by default)
  use_kelly: false
  kelly_fraction: 0.25
  kelly_max_risk: 0.03
  # ATR-based dynamic stop (off by default)
  use_atr_stop: false
  atr_multiplier: 1.5
  atr_col: atr_14
  min_sl_pips: 15.0
  max_sl_pips: 60.0
  # Portfolio cap
  max_portfolio_risk: 0.03
  # Drawdown throttle
  drawdown_threshold: 0.10
  drawdown_throttle: 0.50

# ── Phase 7: Backtester / Walk-Forward / Monte Carlo ──────────────────────────
backtester:
  threshold: 0.40             # min P_buy / P_sell to trade
  sl_pips: 30.0
  tp_pips: 60.0
  pip_size: 0.0001            # EURUSD
  spread_pips: 1.0            # realistic EURUSD spread
  commission_pips: 0.5        # round-trip commission
  max_slippage_pips: 0.3      # max random slippage per fill
  initial_balance: 10000.0
  risk_pct: 0.01              # 1% per trade
  use_regime_filter: false    # set true to suppress signals when ADX < adx_threshold
  adx_threshold: 20.0
  adx_col: adx_14

walk_forward:
  model_type: xgboost         # xgboost | lightgbm | catboost | random_forest | ensemble
  window_type: expanding      # expanding | sliding
  train_days: 180
  test_days: 30
  cache_dir: data/models/wf_cache

monte_carlo:
  n_simulations: 1000
  seed: 42

# ── Phase 2: Rule-based signal bot ────────────────────────────────────────────
rule_bot:
  symbol: "EURUSD"
  timeframe: "M15"
  sl_pips: 30
  tp_pips: 60
  candles: 100          # bars fetched for indicator computation
  threshold: 0.55       # minimum P_buy or P_sell to open a trade
  # Indicator periods
  fast_ma: 9
  slow_ma: 21
  rsi_period: 14
  bb_period: 20
  atr_period: 14
  # Rule weights (relative importance)
  weight_ma_cross: 2.0
  weight_rsi: 1.5
  weight_bb: 1.0
  weight_macd: 1.0

# ── Latent Feature Encoder (Phase 9 extension) ────────────────────────────────
# Decoupled autoencoder that compresses raw OHLCV windows into latent market-state
# vectors. These are merged with the existing 31-feature matrix to produce an
# enriched input for XGBoost/LightGBM/CatBoost/Ensemble.
#
# Training:  conda run -n envmt5 python scripts/train_autoencoder.py
# Merging:   conda run -n envmt5 python scripts/build_latent_features.py
# Comparing: conda run -n envmt5 python scripts/compare_latent_vs_baseline.py
latent_encoder:
  enabled: false                              # set true to use extended feature matrix
  window_size: 50                             # OHLCV bars per input window (bars t-W to t-1)
  latent_dim: 16                              # compressed dimensions output per bar
  epochs: 30                                  # autoencoder training epochs
  batch_size: 512                             # mini-batch size
  lr: 0.001                                   # Adam learning rate
  path: data/models/autoencoder.pt            # saved encoder artifact
  features_output: data/features/EURUSD_M15_features_latent.parquet  # merged output
